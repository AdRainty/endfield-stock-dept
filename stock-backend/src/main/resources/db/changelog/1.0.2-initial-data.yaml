databaseChangeLog:
  - changeSet:
      id: 1.0.2-initial-data
      author: adrainty
      comment: 插入初始化数据
      changes:
        # 插入默认交易所数据
        - insert:
            tableName: exchange
            columns:
              - column: { name: exchange_code, value: 'VALLEY' }
              - column: { name: name, value: '四号谷底' }
              - column: { name: description, value: '位于四号谷底的交易所，主要交易能源类调度券' }
              - column: { name: status, valueNumeric: 1 }
              - column: { name: trading_start, value: '00:00' }
              - column: { name: trading_end, value: '23:59' }

        - insert:
            tableName: exchange
            columns:
              - column: { name: exchange_code, value: 'WULING' }
              - column: { name: name, value: '武陵' }
              - column: { name: description, value: '位于武陵地区的交易所，主要交易技术类调度券' }
              - column: { name: status, valueNumeric: 1 }
              - column: { name: trading_start, value: '00:00' }
              - column: { name: trading_end, value: '23:59' }

        # 插入默认角色数据
        - insert:
            tableName: sys_role
            columns:
              - column: { name: role_code, value: 'ADMIN' }
              - column: { name: role_name, value: '管理员' }
              - column: { name: description, value: '系统管理员' }
              - column: { name: status, valueNumeric: 1 }

        - insert:
            tableName: sys_role
            columns:
              - column: { name: role_code, value: 'USER' }
              - column: { name: role_name, value: '普通用户' }
              - column: { name: description, value: '普通交易用户' }
              - column: { name: status, valueNumeric: 1 }
