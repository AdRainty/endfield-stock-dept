# 生产环境配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:endfield}?currentSchema=public
    username: ${DB_USERNAME:endfield}
    password: ${DB_PASSWORD:endfield}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

  # Liquibase 配置
  liquibase:
    enabled: true
    # 生产环境使用上下文控制
    contexts: production

mybatis-plus:
  configuration:
    # 生产环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
    com.adrainty.stock: INFO
    liquibase: WARN

# 微信公众号配置（用于扫码登录）
wechat:
  mp:
    app-id: ${WECHAT_MP_APP_ID:}
    app-secret: ${WECHAT_MP_APP_SECRET:}
    token: ${WECHAT_MP_TOKEN:}
    aes-key: ${WECHAT_MP_AES_KEY:}

# 生产环境关闭日志
sa-token:
  is-log: false
