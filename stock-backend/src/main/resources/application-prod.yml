# 生产环境配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:endfield}?currentSchema=public
    username: ${DB_USERNAME:endfield}
    password: ${DB_PASSWORD:endfield}

mybatis-plus:
  configuration:
    # 生产环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
    com.adrainty.stock: INFO

# 生产环境关闭日志
sa-token:
  is-log: false
