# 开发环境配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:endfield}?currentSchema=public
    username: ${DB_USERNAME:endfield}
    password: ${DB_PASSWORD:endfield}

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 5000ms

  # Liquibase 日志
  liquibase:
    enabled: true

mybatis-plus:
  configuration:
    # 开发环境开启 SQL 日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

