# 终末地调度券交易模拟系统 - 应用配置
server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: endfield-stock-dept
  profiles:
    active: dev

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

  # Liquibase 配置
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  # Jackson 配置
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  # Spring AI 配置
  ai:
    # OpenAI 配置（可使用兼容 API 的服务）
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.7
          max-tokens: 2000
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    # MCP 配置
    mcp:
      client:
        enabled: ${MCP_ENABLED:false}
        server-url: ${MCP_SERVER_URL:http://localhost:8080/mcp}

# Redisson 配置
redisson:
  single-server-config:
    address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
    password: ${REDIS_PASSWORD:}
    database: 0
    connection-minimum-idle-size: 10
    connection-pool-size: 64
    idle-connection-timeout: 10000
    connect-timeout: 10000
    timeout: 3000

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.adrainty.stock.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Sa-Token 配置
sa-token:
  # token 名称
  token-name: Authorization
  # token 有效期 (秒)，-1 表示永不过期
  timeout: 2592000
  # token 最低活跃频率 (秒)
  active-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否在登录后踢掉之前的登录
  is-share: false
  # token 风格 (uuid/simple-uuid)
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # 是否从 header 读取 token
  is-read-header: true
  # 是否从 cookie 读取 token
  is-read-cookie: true

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    org.springframework.ai: DEBUG

# 自定义配置
app:
  # 交易所配置
  exchange:
    # 四号谷底交易所
    valley:
      id: 1
      name: 四号谷底
      code: VALLEY
    # 武陵交易所
    wuling:
      id: 2
      name: 武陵
      code: WULING

  # 交易时间配置
  trading:
    # 早盘开始时间
    morning-open: "09:30"
    # 早盘结束时间
    morning-close: "11:30"
    # 午盘开始时间
    afternoon-open: "13:00"
    # 午盘结束时间
    afternoon-close: "15:00"
    # 集合竞价时间
    call-auction: "09:15"
    # 禁止撤单开始时间
    night-cancel-start: "20:00"

  # 新闻生成配置
  news:
    # 早报生成时间
    morning-time: "08:30"
    # 晚报生成时间
    evening-time: "21:00"
    # 参考新闻数量
    reference-count: 10
    # 最大影响幅度
    max-impact-percent: 30
